version: "4.1"
name: NewProject2
type: ARM
deviceName: STM32F103C8
packDir: .pack/Keil/STM32F1xx_DFP.2.3.0
srcDirs:
  - Core
  - Drivers
virtualFolder:
  name: <virtual_root>
  files:
    - path: CUBEMX.ioc
    - path: Makefile
    - path: startup_stm32f103xb.s
    - path: STM32F103XX_FLASH.ld
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 1a3d156d805cf644c31d6edb528051e5
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32F103xB
        - STM32F10X_MD
      incList:
        - .
        - Core/Inc
        - Drivers/STM32F1xx_HAL_Driver/Inc
        - Drivers/STM32F1xx_HAL_Driver/Inc/Legacy
        - Drivers/CMSIS/Device/ST/STM32F1xx/Include
        - Drivers/CMSIS/Include
      libList: []
    excludeList: []
    settings: {}
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: STM32F103XX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      STLink:
        address: "0x08000000"
        bin: ""
        elFile: None
        optionBytes: .eide/debug.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
    uploader: STLink
